<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="CNC NANO">
    
    <link rel="icon" type="image/png" href="icon.png">
    <link rel="apple-touch-icon" href="icon.png">
    <link rel="manifest" href="manifest.json">
    
    <title>CNC Nano Pro v4.2</title>
    
    <link rel="stylesheet" href="style.css">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

    <div class="app">
        <header>
            <div class="header-left">
                <h1>CNC NANO <span>PRO</span> <small>v4.2</small></h1>
                <div id="date-info" class="date-info">Semaine -- | --/--/----</div>
            </div>
            <div class="header-right">
                <div id="shift-badge" class="shift-badge">--</div>
                <div id="clock-container">
                    <i data-lucide="clock" size="14"></i>
                    <span id="clock">00:00</span>
                </div>
            </div>
        </header>

        <div class="grid-input">
            <div class="field full">
                <label><i data-lucide="tag" size="10"></i> Référence Commande</label>
                <input type="text" id="ref" placeholder="Ex: CMD-102">
            </div>
            
            <div class="field">
                <label><i data-lucide="wrench" size="10"></i> Montage (min)</label>
                <div class="number-control">
                    <button type="button" onclick="step('setup', -5)">-</button>
                    <input type="number" id="setup" value="0" inputmode="decimal">
                    <button type="button" onclick="step('setup', 5)">+</button>
                </div>
            </div>
            
            <div class="field">
                <label><i data-lucide="layers" size="10"></i> Qté Totale</label>
                <div class="number-control">
                    <button type="button" onclick="step('qte', -1)">-</button>
                    <input type="number" id="qte" inputmode="numeric">
                    <button type="button" onclick="step('qte', 1)">+</button>
                </div>
            </div>
            
            <div class="field">
                <label><i data-lucide="timer" size="10"></i> Cycle (min)</label>
                <div class="number-control">
                    <button type="button" onclick="step('time', -0.5)">-</button>
                    <input type="number" id="time" value="0" inputmode="decimal">
                    <button type="button" onclick="step('time', 0.5)">+</button>
                </div>
            </div>
            
            <div class="reprise-container full">
                <label class="switch-label">
                    <span><i data-lucide="refresh-cw" size="14"></i> Reprise de poste ?</span>
                    <div class="switch">
                        <input type="checkbox" id="check">
                        <span class="slider"></span>
                    </div>
                </label>
            </div>
            
            <div id="done-div" class="field full hidden">
                <label>Pièces déjà faites</label>
                <input type="number" id="done" value="0" inputmode="numeric">
            </div>
            
            <button class="main-btn" id="btn-start">
                <i data-lucide="play" size="16"></i> Démarrer la série
            </button>
        </div>

        <div id="results">
            <div class="res-lab">Fin estimée (réelle)</div>
            <div id="res-main" class="big-res">--:--</div>
            <div id="shift-end-status" class="status-badge"></div>
            
            <div class="res-footer-main">
                <div class="res-item">
                    <span class="res-lab">Objectif Fin</span>
                    <span id="res-target-time">--:--</span>
                </div>
                <div class="res-item">
                    <span class="res-lab">Fin Poste</span>
                    <span id="res-shift-time">--:--</span>
                </div>
            </div>

            <div class="res-footer-sub">
                <div>CIBLE: <span id="res-tpp">--</span></div>
                <div>À FAIRE: <span id="res-obj">--</span></div>
            </div>
        </div>

        <div id="bilan-section">
            <div id="start-info" class="info-start">
                <i data-lucide="info" size="12"></i> Début: --:-- | Réel: 0h 00m
            </div>
            
            <div class="field full">
                <label>Pièces produites (Total série)</label>
                <input type="number" id="real-qty" placeholder="Quantité actuelle" inputmode="numeric">
            </div>

            <div class="shift-stats">
                <div class="res-lab">Production de mon poste</div>
                <div id="shift-prod" class="delta-val" style="color: var(--accent);">0</div>
            </div>
            
            <div class="bilan-grid">
                <div class="bilan-item">
                    <span class="res-lab">Cadence réelle</span>
                    <span id="real-cadence" class="delta-val">--</span>
                </div>
                <div class="bilan-item">
                    <span class="res-lab">Avance / Retard</span>
                    <span id="real-delta" class="delta-val">--</span>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        // Initialiser Lucide Icons
        lucide.createIcons();
    </script>
</body>
</html>
